<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Controle de Campanhas Escolares</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="./assets/imagens/logo.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <style type="text/css">
      .mat-typography {
        background-color: #0a1929;
      }

      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0a1929 0%, #102a43 100%);
        animation: splashFadeOut 0.7s ease forwards 1.8s;
      }

      #splash-screen img {
        width: 280px;
        opacity: 0.18;
      }

      @keyframes splashFadeOut {
        to {
          opacity: 0;
          visibility: hidden;
          pointer-events: none;
        }
      }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body class="mat-typography">
    <div id="splash-screen">
      <img src="./assets/imagens/logo.png" alt="Logo" />
    </div>
    <app-root></app-root>
  </body>
</html>
