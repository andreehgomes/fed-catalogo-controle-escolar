<div class="recebimentos-wrap" *ngIf="recebimentos.length > 0">
  <mat-accordion>
    <mat-expansion-panel>
      <mat-expansion-panel-header>
        <mat-panel-title class="panel-title">
          <mat-icon class="panel-icon">payments</mat-icon>
          Pagamentos
        </mat-panel-title>
        <mat-panel-description class="panel-desc">
          {{ recebimentos.length }} {{ recebimentos.length === 1 ? 'registro' : 'registros' }}
        </mat-panel-description>
      </mat-expansion-panel-header>

      <div class="recebimento-item" *ngFor="let r of recebimentos">
        <div class="recebimento-row">
          <div class="recebimento-data-wrap">
            <mat-icon class="row-icon">calendar_today</mat-icon>
            <span class="recebimento-data">{{ r.data | date:'dd/MM/yyyy' }}</span>
          </div>
          <span class="recebimento-valor">R$ {{ fmt(r.valor) }}</span>
        </div>
        <div class="recebimento-bottom">
          <span class="recebimento-descricao">{{ r.descricao }}</span>
          <div class="recebimento-actions">
            <button mat-icon-button type="button" class="btn-comprovante" (click)="onComprovante(r.key)" title="Gerar comprovante">
              <mat-icon>receipt_long</mat-icon>
            </button>
            <button mat-icon-button type="button" class="btn-delete" (click)="onExcluir(r.key)" title="Excluir pagamento">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
        </div>
      </div>

    </mat-expansion-panel>
  </mat-accordion>
</div>
