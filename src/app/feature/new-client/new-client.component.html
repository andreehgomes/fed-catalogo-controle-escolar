<div class="page">
  <div class="header">
    <span class="page-title">{{ editingKey ? 'Editar cliente' : 'Novo cliente' }}</span>
  </div>

  <div class="page-content">
    <form [formGroup]="form" class="form-card">
      <card-alert
        *ngIf="alerta?.codigo != null"
        tipo="{{ alerta.tipo }}"
        codigo="{{ alerta.codigo }}"
        mensagem="{{ alerta.mensagem }}"
      ></card-alert>

      <div class="fields">
        <mat-form-field appearance="outline" color="accent" class="field-full">
          <mat-label>Nome</mat-label>
          <mat-icon matPrefix>person</mat-icon>
          <input matInput formControlName="nome" autocomplete="off" />
        </mat-form-field>

        <mat-form-field appearance="outline" color="accent" class="field-full">
          <mat-label>Telefone (opcional)</mat-label>
          <mat-icon matPrefix>phone</mat-icon>
          <input matInput formControlName="telefone" autocomplete="off" />
        </mat-form-field>
      </div>

      <div class="actions">
        <button mat-stroked-button type="button" (click)="cancelar()">Cancelar</button>
        <button mat-flat-button color="accent" type="button"
                [disabled]="form.invalid" (click)="salvar()">
          Salvar
        </button>
      </div>
    </form>
  </div>
</div>
